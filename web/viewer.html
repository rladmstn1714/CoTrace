<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CoTrace Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;600;700;800&display=swap" rel="stylesheet">
  <style>
    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      font-family: "Manrope", ui-sans-serif, system-ui, -apple-system, sans-serif;
    }

    /* ── Header (matches paper page) ──────────────────────────── */
    header {
      flex-shrink: 0;
      z-index: 10;
      background: rgba(255, 255, 255, 0.96);
      border-bottom: 1px solid rgba(229, 231, 235, 0.9);
      backdrop-filter: blur(18px);
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
      padding: 13px 20px;
      width: min(100%, 1160px);
      margin: 0 auto;
    }

    .brand-group {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 9px;
      font-weight: 800;
      font-size: 1rem;
      letter-spacing: -0.02em;
      color: #111827;
      text-decoration: none;
    }

    .brand:hover { color: #4f46e5; }

    .brand-mark {
      width: 32px;
      height: 32px;
      border-radius: 10px;
      background: linear-gradient(135deg, #4f46e5, #0f766e);
      box-shadow: 0 6px 18px rgba(79, 70, 229, 0.22);
      flex-shrink: 0;
    }

    .brand-sep {
      width: 1px;
      height: 18px;
      background: #e5e7eb;
      flex-shrink: 0;
    }

    /* Active state for viewer — dark pill */
    .brand-viewer-active {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 14px;
      border-radius: 999px;
      background: #111827;
      color: #ffffff;
      font-size: 0.84rem;
      font-weight: 700;
      white-space: nowrap;
    }

    .back-link {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      color: #64748b;
      font-size: 0.88rem;
      font-weight: 600;
      text-decoration: none;
      transition: color 150ms;
    }

    .back-link:hover { color: #4f46e5; }

    /* ── Explorer iframe ──────────────────────────────────────── */
    iframe {
      flex: 1;
      border: none;
      width: 100%;
      display: block;
    }
  </style>
</head>
<body>
  <header>
    <nav>
      <div class="brand-group">
        <a class="brand" href="./" aria-label="Back to CoTrace paper page">
          <span class="brand-mark" aria-hidden="true"></span>
          CoTrace
        </a>
        <span class="brand-sep" aria-hidden="true"></span>
        <span class="brand-viewer-active">CoTrace Viewer</span>
      </div>
      <a class="back-link" href="./">← Back to paper</a>
    </nav>
  </header>

  <iframe
    src="explorer"
    title="CoTrace Explorer"
    allow="clipboard-write"
  ></iframe>
</body>
</html>
