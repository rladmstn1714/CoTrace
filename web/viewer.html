<!doctype html>
<html lang="en">
<head>
  <meta charset="utf-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1" />
  <title>CoTrace Viewer</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Manrope:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <style>
    :root {
      --bg: #ffffff;
      --ink: #111827;
      --muted: #5b6474;
      --line: #e5e7eb;
      --accent: #4f46e5;
      --accent-2: #0f766e;
      --max: 1120px;
    }

    * { box-sizing: border-box; }

    html, body {
      margin: 0;
      height: 100%;
      overflow: hidden;
    }

    body {
      display: flex;
      flex-direction: column;
      font-family: "Manrope", ui-sans-serif, system-ui, -apple-system, BlinkMacSystemFont, "Segoe UI", sans-serif;
      color: var(--ink);
      background: var(--bg);
    }

    a {
      color: inherit;
      text-decoration: none;
    }

    a:hover { color: var(--accent); }

    .container {
      width: min(100% - 40px, var(--max));
      margin: 0 auto;
    }

    /* ── Header: identical to paper page ──────────────────────── */
    header {
      flex-shrink: 0;
      z-index: 10;
      backdrop-filter: blur(18px);
      background: rgba(255, 255, 255, 0.92);
      border-bottom: 1px solid rgba(229, 231, 235, 0.8);
    }

    nav {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 24px;
      padding: 16px 0;
    }

    .brand {
      display: flex;
      align-items: center;
      gap: 10px;
      font-weight: 800;
      letter-spacing: -0.02em;
    }

    .brand-group {
      display: flex;
      align-items: center;
      gap: 14px;
    }

    .brand-sep {
      width: 1px;
      height: 18px;
      background: var(--line);
      flex-shrink: 0;
    }

    /* Active state — same pill shape as index but not a link */
    .brand-viewer-active {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      padding: 6px 14px;
      border-radius: 999px;
      border: 1px solid #bfdbfe;
      background: linear-gradient(180deg, #eff6ff 0%, #dbeafe 100%);
      color: #1e40af;
      font-size: 0.84rem;
      font-weight: 700;
      box-shadow: 0 2px 8px rgba(37, 99, 235, 0.10);
      white-space: nowrap;
    }

    .nav-links {
      display: flex;
      align-items: center;
      gap: 18px;
      color: var(--muted);
      font-size: 0.95rem;
    }

    .nav-links a:hover { color: var(--accent); }

    /* ── Explorer iframe fills remaining height ────────────────── */
    iframe {
      flex: 1;
      border: none;
      width: 100%;
      display: block;
    }
  </style>
</head>
<body>
  <header>
    <div class="container">
      <nav aria-label="Primary navigation">
        <div class="brand-group">
          <a class="brand" href="./" aria-label="Back to CoTrace paper page">
            <span>CoTrace</span>
          </a>
          <span class="brand-sep" aria-hidden="true"></span>
          <span class="brand-viewer-active">CoTrace Viewer (Sample)</span>
        </div>
        <div class="nav-links">
          <a href="./">← Back to paper</a>
        </div>
      </nav>
    </div>
  </header>

  <iframe
    src="explorer"
    title="CoTrace Explorer"
    allow="clipboard-write"
  ></iframe>
</body>
</html>
